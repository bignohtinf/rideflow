# Feast config cho DEMO (local). Tương phản với data/feature/feature_store.yaml
# bản production (provider: aws, offline=redshift, online=redis).
project: rideflow_demo
provider: local
registry: data/registry.db          # SQLite registry (đóng vai s3://.../registry.db)
online_store:
  type: sqlite                       # đóng vai Redis/ElastiCache
  path: data/online_store.db
entity_key_serialization_version: 3
