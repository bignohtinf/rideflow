# Stack DEMO RideFlow — toàn bộ MLOps stack + PORTAL cho từng lớp.
#
#   docker compose -f demo/docker-compose.demo.yml up --build
#
# PORTAL sau khi chạy (cổng host mặc định, override bằng biến môi trường):
#   Dagster (orchestration)    : http://localhost:3300   (DEMO_DAGSTER_PORT)
#   MLflow  (tracking/registry): http://localhost:5000   (DEMO_MLFLOW_PORT)
#   Serve   (FastAPI Swagger)  : http://localhost:8010/docs (DEMO_SERVE_PORT)
#   Prometheus (metrics)       : http://localhost:9091   (DEMO_PROM_PORT)
#   Grafana (dashboards)       : http://localhost:3001   (DEMO_GRAFANA_PORT, admin/admin)
# Ví dụ đổi cổng:  DEMO_DAGSTER_PORT=3000 docker compose -f demo/docker-compose.demo.yml up

services:
  # ── Orchestration portal: Dagster (webserver + daemon qua `dagster dev`) ──
  dagster:
    image: rideflow-demo
    build:
      context: ..
      dockerfile: demo/Dockerfile
    command: >
      sh -c "mkdir -p /app/dagster_home &&
             dagster dev -h 0.0.0.0 -p 3000 -m demo.dagster_demo.definitions"
    environment:
      DAGSTER_HOME: /app/dagster_home
      PUSHGATEWAY_URL: pushgateway:9091   # drift_sensor push PSI lên đây
    ports:
      - "${DEMO_DAGSTER_PORT:-3300}:3000"
    volumes:
      - dagster_home:/app/dagster_home
      - mlflow_data:/app/demo/_mlflow
      - data_data:/app/demo/_data
      - artifacts:/app/demo/_artifacts
      - feast_data:/app/demo/feature_repo/data

  # ── ML Platform portal: MLflow tracking + registry ─────────────────
  mlflow:
    image: rideflow-demo
    command: >
      mlflow ui --backend-store-uri file:///app/demo/_mlflow
                --host 0.0.0.0 --port 5000
    ports:
      - "${DEMO_MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/app/demo/_mlflow

  # ── Pipeline bootstrap (một lần): seed model để serve khởi động ────
  pipeline:
    image: rideflow-demo
    command: >
      sh -c "python -m demo.step1_generate_data &&
             python -m demo.step2_build_features &&
             python -m demo.step3_train &&
             python -m demo.step4_materialize &&
             python -m demo.inject_drift"

    volumes:
      - mlflow_data:/app/demo/_mlflow
      - data_data:/app/demo/_data
      - artifacts:/app/demo/_artifacts
      - feast_data:/app/demo/feature_repo/data

  # ── Serving portal: FastAPI (/docs Swagger, /metrics Prometheus) ───
  serve:
    image: rideflow-demo
    depends_on:
      pipeline:
        condition: service_completed_successfully
    ports:
      - "${DEMO_SERVE_PORT:-8010}:8000"
    volumes:
      - mlflow_data:/app/demo/_mlflow
      - data_data:/app/demo/_data
      - artifacts:/app/demo/_artifacts
      - feast_data:/app/demo/feature_repo/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Monitoring: Pushgateway (nhận metric batch drift/PSI) ──────────
  pushgateway:
    image: prom/pushgateway:v1.9.0
    ports:
      - "${DEMO_PUSHGW_PORT:-9092}:9091"

  # ── Monitoring portal: Prometheus (scrape serve /metrics + pushgw) ─
  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on: [serve, pushgateway]
    ports:
      - "${DEMO_PROM_PORT:-9091}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ── Monitoring portal: Grafana (dashboard auto-provision) ──────────
  grafana:
    image: grafana/grafana:11.2.0
    depends_on: [prometheus]
    ports:
      - "${DEMO_GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/rideflow_dashboard.json:/var/lib/grafana/dashboards/rideflow_dashboard.json:ro

volumes:
  mlflow_data:
  data_data:
  artifacts:
  feast_data:
  dagster_home:
